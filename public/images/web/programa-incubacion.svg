<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#50a8f3"/>

  <!-- floating dots -->
  <g fill="#fff" opacity="0.55">
    <circle cx="70" cy="70" r="5"/>
    <circle cx="105" cy="48" r="3"/>
    <circle cx="330" cy="60" r="5"/>
    <circle cx="355" cy="95" r="3"/>
    <circle cx="50" cy="135" r="3"/>
  </g>

  <!-- Pot -->
  <path d="M130 240 L270 240 L255 285 L145 285 Z" fill="#1d1d1b"/>
  <rect x="125" y="232" width="150" height="14" rx="4" fill="#1d1d1b"/>

  <!-- Stem -->
  <path d="M200 232 L200 135" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M200 195 Q150 180 125 205 Q150 215 200 205 Z" fill="#f1c22d"/>
  <!-- Right leaf -->
  <path d="M200 165 Q255 152 280 178 Q255 192 200 178 Z" fill="#f1c22d"/>

  <!-- Top sprout (small flower / bud) -->
  <circle cx="200" cy="125" r="18" fill="#f1c22d"/>
  <circle cx="200" cy="125" r="6" fill="#1d1d1b"/>

  <!-- Pot detail line -->
  <line x1="155" y1="260" x2="245" y2="260" stroke="#50a8f3" stroke-width="2" opacity="0.5"/>
</svg>
